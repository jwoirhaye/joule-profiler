name: Release

on:
  push:
    branches:
      - main

jobs:
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    outputs:
      prs_created: ${{ steps.release-pr.outputs.prs_created }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        id: release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-release:
    name: Release-plz release
    needs: release-plz-pr
    if: needs.release-plz-pr.outputs.prs_created == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    outputs:
      cli_released: ${{ steps.parse.outputs.cli_released }}
      tag_name: ${{ steps.parse.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        id: release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Parse tag name
        id: parse
        if: steps.release.outputs.releases_created == 'true'
        run: |
          TAG=$(echo '${{ steps.release.outputs.releases }}' | jq -r '.[] | select(.package_name == "joule-profiler-cli") | .tag')
          if [ -n "$TAG" ]; then
            echo "cli_released=true" >> "$GITHUB_OUTPUT"
            echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "cli_released=false" >> "$GITHUB_OUTPUT"
          fi

  build-release:
    needs: release-plz-release
    if: needs.release-plz-release.outputs.cli_released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,x86_64-unknown-linux-musl

      - name: Build GNU
        run: cargo build --release --verbose --target x86_64-unknown-linux-gnu

      - name: Build musl
        run: cargo build --release --verbose --target x86_64-unknown-linux-musl

      - name: Strip binaries
        run: |
          strip target/x86_64-unknown-linux-gnu/release/joule-profiler
          strip target/x86_64-unknown-linux-musl/release/joule-profiler

      - name: Create GNU archive
        run: |
          cd target/x86_64-unknown-linux-gnu/release
          tar czf joule-profiler-${{ needs.release-plz-release.outputs.tag_name }}-x86_64-unknown-linux-gnu.tar.gz joule-profiler
          sha256sum joule-profiler-${{ needs.release-plz-release.outputs.tag_name }}-x86_64-unknown-linux-gnu.tar.gz > joule-profiler-${{ needs.release-plz-release.outputs.tag_name }}-x86_64-unknown-linux-gnu.tar.gz.sha256

      - name: Create musl archive
        run: |
          cd target/x86_64-unknown-linux-musl/release
          tar czf joule-profiler-${{ needs.release-plz-release.outputs.tag_name }}-x86_64-unknown-linux-musl.tar.gz joule-profiler
          sha256sum joule-profiler-${{ needs.release-plz-release.outputs.tag_name }}-x86_64-unknown-linux-musl.tar.gz > joule-profiler-${{ needs.release-plz-release.outputs.tag_name }}-x86_64-unknown-linux-musl.tar.gz.sha256

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release-plz-release.outputs.tag_name }} \
            target/x86_64-unknown-linux-gnu/release/joule-profiler-${{ needs.release-plz-release.outputs.tag_name }}-x86_64-unknown-linux-gnu.tar.gz \
            target/x86_64-unknown-linux-gnu/release/joule-profiler-${{ needs.release-plz-release.outputs.tag_name }}-x86_64-unknown-linux-gnu.tar.gz.sha256 \
            target/x86_64-unknown-linux-musl/release/joule-profiler-${{ needs.release-plz-release.outputs.tag_name }}-x86_64-unknown-linux-musl.tar.gz \
            target/x86_64-unknown-linux-musl/release/joule-profiler-${{ needs.release-plz-release.outputs.tag_name }}-x86_64-unknown-linux-musl.tar.gz.sha256
